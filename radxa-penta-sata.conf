[fan]
# Fan speed ramps linearly between off-temp (0%) and full-temp (100%) in °C.
off-temp = 40
full-temp = 55
# How often the temperature is read and the fan speed updated (seconds).
poll-interval = 60

[button]
# The only currently supported action is `slider`.
click-action = slider
double-click-action = none
press-action = none
# Maximum time between double clicking (seconds).
double-click-time = 0.7
# Long press time (seconds).
press-time = 1.8

[display]
# Set to false to disable the display and skip all related computation.
enabled = true
# Whether to rotate the display 180 degrees.
rotate = false
# Whether to use Fahrenheit.
f-temp = false
# Font file name relative to the fonts directory.
font = Lat15-Terminus12x6.psf.gz
font-medium = Lat15-Terminus16.psf.gz
font-large = Lat15-Terminus28x14.psf.gz

[slider]
# How often the display advances to the next page (seconds).
time = 10
# Animated transition between pages. Available movers: slide-down, slide-from-top.
# Leave either blank to disable transitions.
transition-out = slide-down
transition-in = slide-from-top
# Number of animation frames and delay between them (milliseconds).
transition-steps = 8
transition-frame-ms = 30
